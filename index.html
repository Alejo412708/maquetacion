<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comidas Rápidas</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <!-- TÍTULO -->
    <header>
        <h1>VENTA DE COMIDAS RÁPIDAS</h1>
    </header>

    <!-- MENÚ HORIZONTAL FLEXBOX -->
    <nav class="menu">
        <a href="#">Inicio</a>
        <a href="#">Menú</a>
        <a href="#">Promociones</a>
        <a href="#">Contacto</a>
    </nav>

    <!-- TABLA -->
    <section class="tabla">
        <h2>Tabla de Productos</h2>

        <table>
            <tr>
                <th>Producto</th>
                <th>Precio</th>
            </tr>

            <tr>
                <td>Perro Caliente</td>
                <td>$12.000</td>
            </tr>

            <tr>
                <td>Hamburguesa</td>
                <td>$18.000</td>
            </tr>

            <tr>
                <td>Gaseosa</td>
                <td>$5.000</td>
            </tr>
        </table>
    </section>

    <!-- GALERÍA GRID -->
    <section>
        <h2>Galería de Comidas</h2>

        <div class="galeria">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Hamburguesa">
                <h3>Hamburguesa</h3>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1619740455993-9e612b1af08a" alt="Perro caliente">
                <h3>Perro Caliente</h3>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97" alt="Gaseosa">
                <h3>Gaseosa</h3>
                <button>Comprar</button>
            </div>

        </div>
    </section>

</body>
</html>
