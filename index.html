<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidad 3 - CSS3</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <!-- ENCABEZADO -->
    <header>
        <h1>UNIDAD 3 - CSS3</h1>
        <p>Flexbox, Grid y Responsive Design</p>
    </header>

    <!-- MENÚ FLEXBOX -->
    <nav class="menu">
        <a href="#">Inicio</a>
        <a href="#">Servicios</a>
        <a href="#">Galería</a>
        <a href="#">Contacto</a>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main>

        <!-- SECCIÓN FLEXBOX -->
        <section>
            <h2>Ejercicio 1: Flexbox</h2>

            <div class="contenedor-flex">
                <div class="caja">Caja 1</div>
                <div class="caja">Caja 2</div>
                <div class="caja">Caja 3</div>
            </div>
        </section>

        <!-- SECCIÓN GRID -->
        <section>
            <h2>Ejercicio 2: Galería con Grid</h2>

            <div class="galeria">
                <div class="item">Imagen 1</div>
                <div class="item">Imagen 2</div>
                <div class="item">Imagen 3</div>
                <div class="item">Imagen 4</div>
                <div class="item">Imagen 5</div>
                <div class="item">Imagen 6</div>
            </div>
        </section>

        <!-- BOTONES -->
        <section>
            <h2>Ejercicio 3: Hover en botones</h2>

            <button class="btn">Guardar</button>
            <button class="btn">Enviar</button>
        </section>

    </main>

    <!-- PIE DE PÁGINA -->
    <footer>
        <p>Actividad CSS3 - Ingeniería de Sistemas 2026</p>
    </footer>

</body>
</html>
